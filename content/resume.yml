accomplishments:
  content: |
    ## Technical Accomplishments
    Key technical accomplishments I've spearheaded during my development career.
  list:
    - icon: "i-simple-icons-vuedotjs"
      label: Validation Library Refactor
      description: At Continued, I modernized a clunky validation library from Vuelidate to Vee Validate, rewriting 30+ validation rules and refactoring 20 some form components to use Vue composition API instead of options API. This allowed us to streamline boilerplate code, improve developer experience, improve validation telemetry with built in developer tools, and ultimately shifted my teams perspective allowing us to configure validation and error messaging for our CMS via script blocks versus inline HTML attributes.
    - icon: "i-lucide-atom"
      label: Component Library Migration
      description: Shortly after the validation library refactor I designed and implemented a fresh component library for based off our original design choices. I collaborated with our design team to align both UIUX and our front end developers on a shared vision. This redesign served as the foundational "it just works" library, accelerating our greenfield business to business platform.
    - icon: "i-lucide-graduation-cap"
      label: Mentorship & Training Within Continued
      description: I've mentored several junior and senior developers on various teams within Continued, helping them grow their skills and knowledge of our five year old repositories. In under a month I was able to assist multiple junior developers become self sufficient in our codebase. Over five years at Continued I've given talks on Vue, Validation, code architecture, documentation, and created "cheat sheet" handouts for developers to use as quick references.
    - icon: "i-lucide-shield-check"
      label: Certification and Continuing Education
      description: I've completed Vue.js, Nuxt.js, Deque Universities accessibility certification, and various other courses, including a full stack web development program at Austin Coding Academy. I'm always pursuing new knowledge, and recognize the importance of improving both soft and hard skills.
