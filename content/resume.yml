title: Resume
description: What I do, what I know, and how I've got here. It's been a long and winding road full of adventures aplenty and enthusiastic growth. I'm not done yet, there's still hills to climb.
content: |
  ## What I Do

  I make websites and games using modern web practices. I use Vue.js and Nuxt.js for web development and Godot's GDScript for making games. I specialize in front end development with a focus on user experience and accessibility. I advocate for code architecture, documentation, and human readable code. I use AI to expedite my understanding of systems and offload mundane tasks, call me old fashioned but I still write some code manually and enjoy the process of engineering by hand. 

  ## What I Know

