title: More About Me
description: Sean here, I'm a web developer, a comics illustrator, a 3D artist, a poet, a storyteller, but mostly I'm a well-versed, certified technology nerd.
content: |

  ### Where It Started

  I grew up wild in the cornfields of Indiana, swinging tree-branch swords in my backyard. That childhood lens of imagination and adventure evolved into an ever-growing interest in all things internet and storytelling — many years later, here we are. I'm as imaginitive as ever and creating stories of my own.

  ### What I Do Now

  Since 2021 I've worked as a web developer for [**continued.com**](https://continued.com){:target="_blank"}. When I'm not shipping code, I'm usually deep in worldbuilding, drawing, or turning ideas into something you can click, read, or roll dice for.
  
  I'm currently the Technical Lead for a guerilla team of developers building user facing content while handling authorization, authentication.
