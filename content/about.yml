title: Let's Talk About Me
description: Nice to meet you! I'm a web developer, a comics illustrator, a 3D artist, a poet, a storyteller, but mostly I'm a well-versed, certified technology nerd.
content: |

  ### Where It Started

  I grew up in the cornfields of Indiana, swinging tree-branch swords and imagining backyard adventures. That sense of play and story evolved into an ever-growing interest in all things internet and storytelling — and here we are.

  ### What I Do Now

  I currently work as a web developer for **continued.com**, working on their Vue site. When I'm not shipping code, I'm usually deep in worldbuilding, drawing, or turning ideas into something you can click, read, or roll dice for.

  ### Get in Touch

  If you're interested in finding out more about my projects, I'm all over the place on social media — just look me up!

  Stay a while and browse my work, or make a selection in the navbar to filter by type!
