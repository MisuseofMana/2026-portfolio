title: I Made This Stuff
description: I spend a great deal of time creating and imagining. I'm interested in documentation as an artform. My projects often fall into a bucket of fiction and archiving. I enjoy reflecting on organization and process, the journey is just as important as the destination. The links herein are a mix of recent passion projects and personal work. Take all the time you need to explore.
