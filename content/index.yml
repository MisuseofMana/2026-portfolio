seo:
  title: "Sean Yager - Web Developer"
title: "What's up, I'm Sean Yager a Web Developer & Storyteller"
description: "I'm deeply invested in engineering as an artistic medium, using programming languages to communicate narratives, make connections, author zines, create games, etc. You get the gist, right? I make stuff."
hero:
  links:
    - label: "Email me."
      to: "mailto:contact@seanyager.com"
      color: "warning"
about:
  title: "About Me"
  description:
    I'm a web developer, a comics illustrator, a 3D artist, a storyteller, a strategist, an archivist, a game designer, a writer, and a teacher.
    Above all else, I learn.
    I've worked in Continuing Education for 5 years, currently serving as the Technical Lead for a small team of developers building user facing content while handling authorization and authentication.
faq:
  title: "Frequently Asked Questions"
  list:
    - question: "Where did you learn to program?"
      answer: |
        I started with **Dreamweaver** back in 2011, moved onto hand coding my own websites and apps, manually uploading to servers with an FTP client. **Then** I bought into the adoption of web frameworks, learned version control with Git, and earned a full stack certification via Austin Coding Academy in 2019. 

        I've been hand coding for a long time, and now we're headed into yet another era of programming with the rise of AI. Excited to see where we go from here.
      key: "learning-to-program"
    - question: "What do you find most compelling about engineering?"
      answer: |
        I'm drawn to specific aspects of engineering where the intersection of art and technology can be explored. The idea of creating something both functional and intentionally designed is where I flourish. Taking pride and searching for ownership in my work is what motivates me to continue learning and growing. It's not just about the code, it's about the architecture, and the design, and the collaboration with others to invent a beautiful thing.
      key: "favorite-color"
    - question: "What do you do for fun?"
      answer: |
        I draw comics, play video games, board games, and I'm always looking for new ways to create and explore. I keep a pocket journal on me to capture ideas, stories, and doodles.

        I'm into photography, and poetry, and hiking, and cooking and anything that involves being creative and sharing a laugh with friends. When I was younger I was a theater kid which followed me into adulthood in the form of improv comedy and commiting to the bit.
      key: "whats-for-fun"